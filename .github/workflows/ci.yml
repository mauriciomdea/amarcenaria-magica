name: Site checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
      - name: Build with the GitHub Pages dependency set
        run: bundle exec jekyll build --trace
      - name: Install image validation dependency
        run: python -m pip install --disable-pip-version-check pillow
      - name: Check generated media and required files
        run: python scripts/check_site.py
      - name: Check generated HTML, links and local assets
        run: python scripts/check_build.py
