{% assign media = site.data.media[include.key] %}
{% assign image_alt = include.alt | default: media.alt %}
{% assign image_sizes = include.sizes | default: '(min-width: 1080px) 1080px, 100vw' %}
<picture class="responsive-picture{% if include.picture_class %} {{ include.picture_class }}{% endif %}">
  <source type="image/avif" srcset="{% for variant in media.variants %}{{ variant.avif | relative_url }} {{ variant.width }}w{% unless forloop.last %}, {% endunless %}{% endfor %}" sizes="{{ image_sizes }}">
  <source type="image/webp" srcset="{% for variant in media.variants %}{{ variant.webp | relative_url }} {{ variant.width }}w{% unless forloop.last %}, {% endunless %}{% endfor %}" sizes="{{ image_sizes }}">
  <img src="{{ media.fallback | relative_url }}" srcset="{% for variant in media.variants %}{{ variant.jpg | relative_url }} {{ variant.width }}w{% unless forloop.last %}, {% endunless %}{% endfor %}" sizes="{{ image_sizes }}" width="{{ media.width }}" height="{{ media.height }}" alt="{{ image_alt | escape }}" class="{{ include.class }}" {% if include.eager %}loading="eager" fetchpriority="high"{% else %}loading="lazy" decoding="async"{% endif %}>
</picture>
